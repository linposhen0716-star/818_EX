<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH DASHBOARD | 進銷存管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1>DATA TABLE_ // INVENTORY</h1>
                <p class="subtitle">Vendor Grouping Mode Active</p>
            </div>
            <button id="add-vendor-btn" class="add-btn">+ ADD VENDOR (新增廠商)</button>
        </div>

        <!-- 所有的廠商群組會被注入到這個容器裡 -->
        <div id="inventory-container">
            <!-- JavaScript will inject vendor groups here -->
        </div>
        
        <button id="save-btn" class="save-btn">SAVE DATA</button>
    </div>

    <script src="JavaScript/main.js"></script>
</body>
</html>
