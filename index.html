<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進銷存管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1>盤點進貨表</h1>
                <button id="collapse-all-btn" class="master-toggle-btn">
                    <span class="toggle-icon">▶</span>
                    <span class="btn-text">一鍵收納</span>
                </button>
            </div>
            <button id="add-vendor-btn" class="add-btn">+新增廠商</button>
        </div>

        <!-- 所有的廠商群組會被注入到這個容器裡 -->
        <div id="inventory-container">
            <!-- JavaScript will inject vendor groups here -->
        </div>

        <div class="footer-actions">
            <button id="export-excel-btn" class="export-btn">匯出Excel</button>
            <button id="save-btn" class="save-btn">存檔</button>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="JavaScript/main.js"></script>
</body>

</html>
